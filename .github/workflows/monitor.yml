name: VFS Randevu Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları Kur
        run: npm install

      - name: Botu Çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VFS_TOKEN: ${{ secrets.VFS_TOKEN }}
          TARGET_COUNTRY: tur
          MISSION_COUNTRY: nld,fra
          CITIES: Istanbul
          CHECK_INTERVAL: "*/5 * * * *"
          VISA_SUBCATEGORIES: Tourism
          VISA_API_URL: https://lift-api.vfsglobal.com/appointment/slots
          MAX_RETRIES: "3"
          DEBUG: "false"
        run: npm start
